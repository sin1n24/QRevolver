<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QRevolver — 早撃ち結果</title>
<link rel="icon" href="assets/struct.ico" />
<style>
  body { margin:0; padding:1em 1em 3em; min-height:100vh;
    background-color:#f7f1e3; color:#4e342e;
    font-family:'Special Elite',monospace;
    background-image:linear-gradient(rgba(247,241,227,.55),rgba(247,241,227,.55)),url('assets/bg.jpg');
    background-size:cover; background-position:center; background-attachment:fixed; }
  h1 { font-size:2.4em; text-align:center; color:#b71c1c; text-shadow:2px 2px 0 #fff8e1;
    border-bottom:2px dashed #5d4037; margin:.2em 0 .6em; letter-spacing:.05em; }
  .sub { text-align:center; color:#6d4c41; margin-top:-.4em; font-size:.85em; }
  #yourResult { font-size:1.7em; background:rgba(255,255,255,.9); border:3px solid #6d4c41;
    padding:.9em; text-align:center; border-radius:12px; max-width:520px; margin:1em auto;
    box-shadow:0 6px 18px rgba(0,0,0,.15); }
  #yourResult strong { color:#b71c1c; font-size:1.6em; }
  .big { font-size:2.6em; color:#b71c1c; }
  form { text-align:center; font-size:1.1em; background:rgba(255,255,255,.92);
    padding:1em; border-radius:12px; border:3px solid #6d4c41; max-width:560px; margin:0 auto; }
  form input[type=text]{ font-size:1em; padding:.4em; margin:.2em; border:1px solid #b8a; border-radius:6px;
    font-family:inherit; width:8em; }
  .button.save { font-size:1.1em; background:#795548; color:#fff; padding:.55em 1.4em;
    border:none; border-radius:8px; cursor:pointer; margin-top:.7em; }
  .button.save:hover { background:#6d4c41; }
  .slide-in { margin:1.4em auto; max-width:560px; background:rgba(255,255,255,.92);
    border:3px solid #6d4c41; border-radius:12px; padding:1em; font-size:1em; overflow-x:auto; }
  .rankHead { margin:0 0 .6em; text-align:center; color:#5d4037; font-size:1.25em;
    border-bottom:2px dashed #b08; border-color:#a1887f; padding-bottom:.3em; }
  table { border-collapse:collapse; width:100%; }
  th,td { border:1px solid #8d6e63; padding:.35em .5em; text-align:center; font-size:.95em; }
  th { background:#5d4037; color:#fff8e1; }
  tr.me td { background:#ffe9c2; font-weight:bold; }
  .comment { text-align:center; color:#b71c1c; font-size:1.15em; margin:1em auto; max-width:560px; }
  .note { text-align:center; color:#8d6e63; font-size:.9em; }
  .msg { text-align:center; }
</style>
</head>
<body>
  <h1>QRevolver</h1>
  <div class="sub">The Quick-Scan Showdown, Reloaded</div>

  <div id="content" class="msg">読み込み中…</div>

<script>
const params = new URLSearchParams(location.search);
const r = params.get('r');
const esc = (s)=> String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function rankingTable(ranking, myDuration){
  if(!ranking || !ranking.length) return '<p class="note">まだ記録がありません。一番乗りを狙え！</p>';
  let h = '<table><tr><th>順位</th><th>早撃ちタイム</th><th>名前</th><th>場所</th><th>日時</th></tr>';
  ranking.forEach((rec,i)=>{
    const me = (myDuration!=null && Math.abs(rec.duration-myDuration)<1e-9) ? ' class="me"' : '';
    h += `<tr${me}><td>${i+1}</td><td>${rec.duration.toFixed(3)}秒</td><td>${esc(rec.name)}</td><td>${esc(rec.location)}</td><td>${esc(rec.timestamp)}</td></tr>`;
  });
  return h + '</table>';
}

async function load(){
  const c = document.getElementById('content');
  if(!r){ c.innerHTML = '<p>無効なアクセスです。ディスプレイのQRを読み取ってください。</p>'; return; }
  let d;
  try{ d = await (await fetch('/result?r='+encodeURIComponent(r))).json(); }
  catch{ c.innerHTML='<p>通信エラー。もう一度お試しください。</p>'; return; }

  const rankHead = `<h3 class="rankHead">🏆 ${esc(d.monthLabel||'')}のランキング</h3>`;

  if(d.falseStart){
    c.innerHTML = `<div id="yourResult">🤠 <strong>フライング！</strong><br><span class="note">QRが出る前に抜いちまった。<br>ディスプレイで構え直してくれ。</span></div>`
      + `<div class="slide-in">${rankHead}${rankingTable(d.ranking)}</div>`;
    return;
  }
  if(d.stale || d.duration==null){
    c.innerHTML = `<div id="yourResult">この対決はもう決着済みだ。<br><span class="note">ディスプレイで次のラウンドを始めてくれ。</span></div>`
      + `<div class="slide-in">${rankHead}${rankingTable(d.ranking)}</div>`;
    return;
  }

  // 通常結果
  let html = `<div id="yourResult">あなたの早撃ちタイム<br><span class="big"><strong>${d.duration.toFixed(3)}</strong></span> 秒</div>`;

  if(d.canRegister){
    html += `
      <form id="paramForm" onsubmit="return false;">
        ランクイン！名を刻め！<br>
        名前:<input type="text" id="name" maxlength="16" placeholder="ガンマン名">
        場所:<input type="text" id="location" maxlength="16" placeholder="出身地">
        <br><button class="button save" id="regBtn" type="button">登録</button>
        <div id="regMsg" class="note"></div>
      </form>`;
  } else if(d.ranked === false){
    html += `<p class="comment">AIガンマンから一言「${esc(d.aicomment)}」</p>`;
  } else {
    html += `<p class="comment">AIガンマンから一言「${esc(d.thankscomment)}」</p>`;
  }

  html += `<div class="slide-in">${rankHead}<div id="rankBox">${rankingTable(d.ranking, d.duration)}</div></div>`;
  c.innerHTML = html;

  const btn = document.getElementById('regBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      btn.disabled = true;
      const body = new URLSearchParams({ r,
        name: document.getElementById('name').value || '名無し',
        location: document.getElementById('location').value || '' });
      try{
        const res = await (await fetch('/register',{method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'}, body})).json();
        if(res.ok){
          document.getElementById('regMsg').textContent = '登録完了！ナイス早撃ち！';
          document.getElementById('rankBox').innerHTML = rankingTable(res.ranking, d.duration);
          btn.style.display='none';
        }else{
          document.getElementById('regMsg').textContent = res.message || '登録できませんでした。';
          btn.disabled = false;
        }
      }catch{ document.getElementById('regMsg').textContent='通信エラー。'; btn.disabled=false; }
    });
  }
}
load();
</script>
</body>
</html>
